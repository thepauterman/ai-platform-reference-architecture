name: Deploy to Cloud Run

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev

      - name: Build Docker image
        run: |
          docker build -t us-central1-docker.pkg.dev/silver-origin-161220/ai-gateway/gateway:latest ./app

      - name: Push Docker image
        run: |
          docker push us-central1-docker.pkg.dev/silver-origin-161220/ai-gateway/gateway:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ai-governance-gateway \
            --image us-central1-docker.pkg.dev/silver-origin-161220/ai-gateway/gateway:latest \
            --region us-central1 \
            --platform managed \
            --quiet